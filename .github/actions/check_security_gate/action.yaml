# Vendored from SecObserve/secobserve_actions_templates/actions/check_security_gate
# at commit ba98519d49c0e6c320305beb0e128d70d4d098d1, with the Docker image
# pinned by digest instead of the floating :2026_04 monthly tag.
name: 'SecObserve Check Security Gate'
description: 'Checks SecObserve security gate of a product'
author: 'SecObserve'

inputs:
  so_api_base_url:
    description: 'Base URL of the SecObserve backend'
    required: true
  so_api_token:
    description: 'API token of the user to be used for the check.'
    required: true
  so_product_name:
    description: 'Name of the product for which the security gate check is being performed.'
    required: true

runs:
  using: 'docker'
  image: 'docker://ghcr.io/secobserve/secobserve-scanners@sha256:c142c4bac337fefebc991b5b9b43b26b371ed44672c0f5291f819faa1902f9e7'
  entrypoint: 'check_security_gate.sh'
  env:
    SO_API_BASE_URL: ${{ inputs.so_api_base_url }}
    SO_API_TOKEN: ${{ inputs.so_api_token }}
    SO_PRODUCT_NAME: ${{ inputs.so_product_name }}
